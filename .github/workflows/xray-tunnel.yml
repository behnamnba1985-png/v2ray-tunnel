name: xray-tunnel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y unzip wget curl

      - name: Download and setup Xray
        run: |
          wget https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o Xray-linux-64.zip
          chmod +x xray

      - name: Generate UUID and config
        run: |
          UUID=$(cat /proc/sys/kernel/random/uuid || uuidgen)
          echo "UUID: $UUID"
          echo '{
  "inbounds": [{
    "port": 8080,
    "protocol": "vless",
    "settings": {
      "clients": [{"id": "'"$UUID"'"}],
      "decryption": "none"
    },
    "streamSettings": {
      "network": "ws",
      "wsSettings": {"path": "/"}
    }
  }],
  "outbounds": [{"protocol": "freedom"}]
}' > config.json

      - name: Run Xray
        run: |
          ./xray -config config.json &
          sleep 10
          IP=$(curl -s ifconfig.me)
          echo "Server IP: $IP"
          echo "VLESS config: vless://$UUID@$IP:8080?encryption=none&security=auto&type=ws&path=%2F#GitHub-Tunnel"
